
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Misconduct - Crime Awareness Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <span>Pragati Engineering College</span>
        <h1>Crime Awareness Creator</h1>
        <nav>
            <a href="dashboard.html">Dashboard</a>
            <a href="#" onclick="logout()">Logout</a>
        </nav>
    </header>

    <main>
        <section class="report-section">
            <h2>Report Misconduct</h2>
            <p>Use this form to report any misconduct or violation. Your report will be handled confidentially.</p>
            <form id="reportForm" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="accusedName">Accused Name</label>
                    <input type="text" id="accusedName" name="accusedName" required placeholder="Enter the name of the accused">
                </div>
                <div class="form-group">
                    <label for="department">Department</label>
                    <input type="text" id="department" name="department" required placeholder="Enter the department">
                </div>
                <div class="form-group">
                    <label for="violationType">Violation Type</label>
                    <select id="violationType" name="violationType" required>
                        <option value="">Select Violation Type</option>
                        <option value="ragging">Ragging</option>
                        <option value="drug">Drug Use/Distribution</option>
                        <option value="violence">Physical Violence</option>
                        <option value="cyberbullying">Cyberbullying</option>
                        <option value="cheating">Exam Cheating</option>
                        <option value="theft">Theft</option>
                        <option value="harassment">Sexual Harassment</option>
                        <option value="vandalism">Vandalism</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" required placeholder="Provide a detailed description of the incident"></textarea>
                </div>
                <div class="form-group">
                    <label for="evidence">Upload Evidence (Images/Videos)</label>
                    <input type="file" id="evidence" name="evidence" accept="image/*,video/*" multiple>
                </div>
                <div class="form-group checkbox-group">
                    <label>
                        <input type="checkbox" id="anonymous" name="anonymous">
                        Submit anonymously
                    </label>
                </div>
                <button type="submit" class="submit-btn">Submit Report</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="footer-links">
            <a href="#">Anti-Ragging Cell</a>
            <a href="#">Emergency Contact</a>
            <a href="#">University Guidelines</a>
        </div>
        <p>&copy; 2024 Pragati College. All rights reserved.</p>
    </footer>

    <script src="js/report.js"></script>
    <script>
        // Check if user is logged in
        const userRole = localStorage.getItem('userRole');
        if (!userRole) {
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
