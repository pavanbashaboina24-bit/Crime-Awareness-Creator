
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Crimes - Crime Awareness Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        
            <span>Pragati Engineering College</span>
        </div>
        <h1>Crime Awareness Creator</h1>
        <nav>
            <span id="userInfo"></span>
            <a href="dashboard.html">Back to Dashboard</a>
            <a href="#" id="logoutBtn">Logout</a>
        </nav>
    </header>

    <main>
        <section class="crime-section">
            <h2>Crimes by Both Students and Faculty</h2>
            <p>Click on a crime to learn more about its legal implications and consequences.</p>
            <div class="buttons">
                <button class="crime-btn purple" data-crime="cybercrime"><h3>
                    
                </h3>Cybercrime</button>
                <button class="crime-btn pink" data-crime="defamation"><h3>Defamation</h3><p>
                    Publishing false statements to damage someone's reputation
                </p></button>
                <button class="crime-btn orange" data-crime="forgery"><h3>Forgery of Documents</h3><p>
                    Creating or altering documents with false information
                </p></button>
                <button class="crime-btn magenta" data-crime="identity"><h3>Identity Theft</h3><p>
                    Using someone else's personal information without permission
                </p></button>
                <button class="crime-btn green" data-crime="financial"><h3>Financial Fraud</h3><p>
                    Deceiving others for financial gain
                </p></button>
            </div>
            <div id="contentBox" class="content-box"></div>
        </section>
    </main>

    <footer>
        <div class="footer-links">
            <a href="#">Anti-Ragging Cell</a>
            <a href="#">Emergency Contact</a>
            <a href="#">University Guidelines</a>
        </div>
        <p>&copy; 2024 Pragati College. All rights reserved.</p>
    </footer>

    <script src="js/content.js"></script>
    <script>
        // Check if user is logged in
        const userRole = localStorage.getItem('userRole');
        const userId = localStorage.getItem('userId');
        if (!userRole) {
            window.location.href = 'login.html';
        } else {
            // Display user info
            document.getElementById('userInfo').textContent = `${userRole} (${userId})`;
        }

        // Logout functionality
        document.getElementById('logoutBtn').addEventListener('click', function() {
            localStorage.removeItem('userRole');
            localStorage.removeItem('userId');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
